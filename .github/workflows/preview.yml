name: Vercel Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy preview
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Validate Vercel preview configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          missing=()
          [[ -n "$VERCEL_TOKEN" ]] || missing+=("VERCEL_TOKEN")
          [[ -n "$VERCEL_ORG_ID" ]] || missing+=("VERCEL_ORG_ID")
          [[ -n "$VERCEL_PROJECT_ID" ]] || missing+=("VERCEL_PROJECT_ID")

          if ((${#missing[@]})); then
            {
              echo "### Missing Vercel preview configuration"
              echo
              echo "Add these GitHub Actions secrets before rerunning the preview workflow:"
              for secret in "${missing[@]}"; do
                echo "- \`$secret\`"
              done
              echo
              echo "See README.md: Pull request previews with GitHub Actions."
            } >> "$GITHUB_STEP_SUMMARY"

            printf 'Missing required GitHub Actions secrets: %s\n' "${missing[*]}" >&2
            echo "Add them in Settings -> Secrets and variables -> Actions, then rerun the workflow." >&2
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@50.34.3

      - name: Pull Vercel preview configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" 2>&1 | tee "$log_file"
          preview_url="$(tail -n 1 "$log_file")"
          rm -f "$log_file"
          printf 'preview_url=%s\n' "$preview_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = '<!-- vercel-preview-comment -->';
            const shortSha = process.env.COMMIT_SHA.slice(0, 7);
            const body = `${marker}

            ## 🚀 Vercel Preview

            | | |
            |---|---|
            | **Preview URL** | [${process.env.PREVIEW_URL}](${process.env.PREVIEW_URL}) |
            | **Commit** | [\`${shortSha}\`](${process.env.COMMIT_URL}) |`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existingComment = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes(marker),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
